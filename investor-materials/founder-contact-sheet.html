<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Founder Contact Sheet</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: #071019;
        color: #f0f7ff;
      }
      .wrap {
        max-width: 820px;
        margin: 0 auto;
        padding: 32px 20px 72px;
      }
      .card {
        border: 1px solid rgba(131, 168, 208, 0.2);
        border-radius: 24px;
        background: #0d1622;
        padding: 30px;
      }
      .kicker {
        color: #23d5ee;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-size: 12px;
        font-weight: 700;
      }
      h1 {
        margin: 12px 0;
        font-size: clamp(30px, 5vw, 50px);
      }
      p { color: #a9bfd5; line-height: 1.7; }
      .links {
        display: grid;
        gap: 14px;
        margin-top: 24px;
      }
      a {
        display: block;
        padding: 16px 18px;
        border-radius: 18px;
        border: 1px solid rgba(131, 168, 208, 0.2);
        color: #f0f7ff;
        text-decoration: none;
        background: rgba(255, 255, 255, 0.02);
      }
      a span {
        display: block;
        color: #8fd8e7;
        font-size: 13px;
        margin-bottom: 4px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="kicker">Founder Access</div>
        <h1>Gaurav Kumar Singh</h1>
        <p>
          Direct founder links for investor follow-up, diligence and conversation scheduling.
        </p>
        <div class="links">
          <a href="mailto:gaurav@aiforall.ltd">
            <span>Email</span>
            gaurav@aiforall.ltd
          </a>
          <a href="https://www.linkedin.com/in/gaurav-kumar-s-b9347129/" target="_blank" rel="noopener noreferrer">
            <span>LinkedIn</span>
            linkedin.com/in/gaurav-kumar-s-b9347129
          </a>
          <a href="https://www.aiforall.ltd" target="_blank" rel="noopener noreferrer">
            <span>Website</span>
            www.aiforall.ltd
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
