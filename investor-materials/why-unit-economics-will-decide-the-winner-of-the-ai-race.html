<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />
    <title>Why Unit Economics Will Decide the Winner of the AI Race | AI-for-All</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #05080d;
        --line: rgba(143, 169, 199, 0.16);
        --text: #eef5ff;
        --muted: #96abc1;
        --primary: #22d3ee;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(34, 211, 238, 0.11), transparent 28%),
          linear-gradient(180deg, #071019 0%, var(--bg) 100%);
      }

      a { color: inherit; text-decoration: none; }

      a,
      button {
        touch-action: manipulation;
        -webkit-tap-highlight-color: rgba(34, 211, 238, 0.18);
      }

      .shell {
        max-width: 1320px;
        margin: 0 auto;
        padding: 24px 16px 56px;
      }

      .viewer {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: rgba(17, 21, 27, 0.92);
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.26);
      }

      .viewer-body {
        position: relative;
        padding: 18px 60px;
      }

      .slides {
        display: flex;
        gap: 0;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        scroll-behavior: smooth;
      }

      .slides::-webkit-scrollbar {
        height: 10px;
      }

      .slides::-webkit-scrollbar-thumb {
        background: rgba(34, 211, 238, 0.25);
        border-radius: 999px;
      }

      .slide {
        flex: 0 0 100%;
        min-width: 100%;
        margin: 0;
        padding: 0;
        scroll-snap-align: start;
        scroll-snap-stop: always;
      }

      .slide-image {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 18px;
        background: #fff;
      }

      .viewer-arrow {
        position: absolute;
        top: 50%;
        z-index: 2;
        width: 46px;
        height: 46px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 999px;
        background: rgba(17, 21, 27, 0.92);
        color: #ffffff;
        font-size: 28px;
        line-height: 1;
        cursor: pointer;
        transform: translateY(-50%);
      }

      .viewer-arrow.prev {
        left: 8px;
      }

      .viewer-arrow.next {
        right: 8px;
      }

      .site-footer {
        margin-top: 34px;
        padding-top: 24px;
        border-top: 1px solid var(--line);
      }

      .footer-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 24px;
      }

      .footer-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
        font-weight: 700;
      }

      .footer-dot {
        width: 14px;
        height: 14px;
        border-radius: 999px;
        background: var(--primary);
        box-shadow: 0 0 18px rgba(34, 211, 238, 0.45);
      }

      .footer-title {
        margin: 0 0 12px;
        font-size: 0.95rem;
        font-weight: 700;
      }

      .footer-copy,
      .footer-link,
      .footer-small {
        color: var(--muted);
        font-size: 0.94rem;
        line-height: 1.7;
      }

      .footer-link {
        display: inline-flex;
        align-items: center;
        min-height: 44px;
      }
      .footer-link:hover { color: var(--text); }

      .footer-bottom {
        margin-top: 18px;
        padding-top: 16px;
        border-top: 1px solid rgba(143, 169, 199, 0.12);
        color: var(--muted);
        font-size: 0.86rem;
      }

      @media (max-width: 980px) {
        .footer-grid { grid-template-columns: 1fr; }
      }

      @media (max-width: 640px) {
        .shell {
          padding: 12px 8px 40px;
        }

        .viewer {
          border-radius: 16px;
        }

        .viewer-body {
          padding: 12px 8px 20px;
        }

        .viewer-arrow {
          position: static;
          transform: none;
          margin-top: 12px;
        }

        .viewer-arrow.prev {
          margin-right: 8px;
        }

        .slides {
          margin-bottom: 12px;
        }

        .footer-link {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <article class="viewer" aria-label="Why Unit Economics Will Decide the Winner of the AI Race">
        <div class="viewer-body">
          <button class="viewer-arrow prev" type="button" id="slide-prev" aria-label="Previous slide">&#8249;</button>
          <div class="slides" id="slides-track">
            <section class="slide">
              <img class="slide-image" src="./why-unit-economics-will-decide-the-winner-of-the-ai-race-real/Slide1.png" alt="Slide 1" />
            </section>
            <section class="slide">
              <img class="slide-image" src="./why-unit-economics-will-decide-the-winner-of-the-ai-race-real/Slide2.png" alt="Slide 2" />
            </section>
            <section class="slide">
              <img class="slide-image" src="./why-unit-economics-will-decide-the-winner-of-the-ai-race-real/Slide3.png" alt="Slide 3" />
            </section>
          </div>
          <button class="viewer-arrow next" type="button" id="slide-next" aria-label="Next slide">&#8250;</button>
        </div>
      </article>

      <footer class="site-footer">
        <div class="footer-grid">
          <section>
            <div class="footer-brand">
              <span class="footer-dot"></span>
              <span>AI-for-All</span>
            </div>
            <a class="footer-link" href="https://www.aiforall.ltd" target="_blank" rel="noopener noreferrer">www.aiforall.ltd</a>
            <p class="footer-copy">Edge-first AI infrastructure reducing GPU costs for the next billion users.</p>
          </section>

          <section>
            <h3 class="footer-title">Founder</h3>
            <div class="footer-small">Gaurav Kumar Singh</div>
            <a class="footer-link" href="mailto:gaurav@aiforall.ltd">gaurav@aiforall.ltd</a>
            <a class="footer-link" href="https://www.linkedin.com/in/gaurav-kumar-s-b9347129/" target="_blank" rel="noopener noreferrer">LinkedIn Profile</a>
          </section>
        </div>

        <div class="footer-bottom">&copy; 2026 Gaurav Kumar Singh. All rights reserved.</div>
      </footer>
    </main>
    <script>
      (function () {
        const track = document.getElementById("slides-track");
        const prev = document.getElementById("slide-prev");
        const next = document.getElementById("slide-next");

        if (!track || !prev || !next) return;

        function move(direction) {
          const step = track.clientWidth;
          track.scrollBy({ left: direction * step, behavior: "smooth" });
        }

        prev.addEventListener("click", function () {
          move(-1);
        });

        next.addEventListener("click", function () {
          move(1);
        });
      })();
    </script>
  </body>
</html>
