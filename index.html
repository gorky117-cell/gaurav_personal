    <script>
      (function () {
        const DOCS_DATA_URL = "./assets/docs-data.json";

        async function loadDocsData() {
          try {
            const response = await fetch(DOCS_DATA_URL, { cache: "no-store" });
            if (!response.ok) return [];
            return await response.json();
          } catch (error) {
            return [];
          }
        }

        function buildCard(item) {
          const card = document.createElement("a");
          card.className = "investor-card";
          card.href = item.url;
          card.target = item.external ? "_blank" : "_self";
          card.rel = item.external ? "noopener noreferrer" : "";

          if (item.variant === "deck") {
            card.classList.add("investor-card-deck");
          }

          const meta = document.createElement("div");
          meta.className = "investor-card-meta";
          meta.innerHTML =
            '<span class="investor-chip">' +
            (item.badge || "Material") +
            "</span>" +
            (item.meta ? '<span class="investor-meta-text">' + item.meta + "</span>" : "");

          const heading = document.createElement("h3");
          heading.className = "investor-card-title";
          heading.textContent = item.title;

          const subheading = document.createElement("p");
          subheading.className = "investor-card-subtitle";
          subheading.textContent = item.subtitle;

          const description = document.createElement("p");
          description.className = "investor-card-description";
          description.textContent = item.description;

          const footer = document.createElement("div");
          footer.className = "investor-card-footer";
          footer.innerHTML =
            '<span class="investor-open-text">Open material</span><span class="investor-arrow">→</span>';

          card.appendChild(meta);
          card.appendChild(heading);
          card.appendChild(subheading);
          card.appendChild(description);
          card.appendChild(footer);

          return card;
        }

        function renderInvestorDocs(section, items) {
          section.innerHTML = "";
          section.classList.add("investor-docs-section");

          const wrap = document.createElement("div");
          wrap.className = "investor-docs-wrap";

          const intro = document.createElement("div");
          intro.className = "investor-docs-intro";
          intro.innerHTML =
            '<span class="investor-section-kicker">Documents</span>' +
            '<h2 class="investor-section-title">Presentations and notes</h2>';
          wrap.appendChild(intro);

          const grid = document.createElement("div");
          grid.className = "investor-docs-grid";
          items.forEach(function (item) {
            grid.appendChild(buildCard(item));
          });
          wrap.appendChild(grid);

          section.appendChild(wrap);
        }

        function runUntilDone(task, maxAttempts, delay) {
          let attempts = 0;

          const tick = async function () {
            attempts += 1;
            const done = await task();
            if (!done && attempts < maxAttempts) {
              setTimeout(tick, delay);
            }
          };

          if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", tick, { once: true });
          } else {
            tick();
          }
        }

        function installDocsEnhancer() {
          let rendered = false;

          runUntilDone(async function () {
            const section = document.getElementById("docs");
            if (!section || rendered) return false;

            const items = await loadDocsData();
            if (!items.length) return false;

            renderInvestorDocs(section, items);
            rendered = true;
            return true;
          }, 20, 400);
        }

        function updateHeroCopy() {
          runUntilDone(function () {
            const hero = document.getElementById("hero");
            if (!hero) return false;

            const paragraph = hero.querySelector("p");
            if (paragraph) {
              paragraph.textContent =
                "Edge-first AI infrastructure powered by intelligent edge-cloud orchestration. Cutting inference cost through smarter routing across device and cloud.";
              return true;
            }
            return false;
          }, 20, 400);
        }

        function removeDuplicateContactButton() {
          runUntilDone(function () {
            const footer = document.getElementById("contact");
            if (!footer) return false;

            const buttons = Array.from(document.querySelectorAll("a"));
            const duplicate = buttons.find(function (link) {
              return link.textContent && link.textContent.trim() === "Get in Touch";
            });
            if (duplicate) {
              duplicate.remove();
            }
            return true;
          }, 20, 400);
        }

        function removeDuplicateFooterIcons() {
          runUntilDone(function () {
            const footer = document.getElementById("contact");
            if (!footer) return false;

            const iconRow = Array.from(footer.querySelectorAll("div")).find(function (node) {
              const directChildren = Array.from(node.children);
              if (
                directChildren.length !== 3 ||
                !directChildren.every(function (child) { return child.tagName === "A"; })
              ) {
                return false;
              }

              const hrefs = directChildren.map(function (link) {
                return link.getAttribute("href") || "";
              });
              return (
                hrefs.some(function (href) { return href.indexOf("linkedin.com") >= 0; }) &&
                hrefs.some(function (href) { return href.indexOf("mailto:") === 0; }) &&
                hrefs.some(function (href) { return href.indexOf("aiforall.ltd") >= 0; })
              );
            });

            if (iconRow) {
              iconRow.remove();
            }
            return true;
          }, 20, 400);
        }

              '<p class="text-sm text-muted-foreground leading-relaxed">Edge-first AI infrastructure reducing GPU costs for the next billion users.</p>' +
              '</div>' +
              '<div>' +
              '<h4 class="text-sm font-semibold mb-4">Founder</h4>' +

              '<a href="https://www.linkedin.com/in/gaurav-kumar-s-b9347129/" target="_blank" rel="noopener noreferrer" class="footer-direct-link contact-link-enhanced footer-founder-link text-sm text-muted-foreground hover:text-primary inline-flex transition-colors">LinkedIn Profile</a>' +
              '</div>' +
              '</div>' +
              '<div>' +

              '<div class="footer-direct-link text-sm text-muted-foreground">Patent Filed (Complete Specification) - App No. 202511059693</div>' +
              '</div>' +

              '<p class="text-xs text-muted-foreground">&copy; 2026 Gaurav Kumar Singh. All rights reserved.</p>' +

            return true;
          }, 20, 400);
        }

        function updateProgressStage() {
          runUntilDone(function () {
            const section = Array.from(document.querySelectorAll("section")).find(function (node) {
              return node.textContent && node.textContent.indexOf("Current Stage") >= 0;
            });

            if (!section) return false;

            section.innerHTML =
              '<div class="max-w-6xl mx-auto px-6">' +
              '<div class="text-center mb-16">' +
              '<span class="text-xs font-semibold uppercase tracking-widest text-primary mb-3 block">Progress</span>' +
              '<h2 class="text-3xl md:text-4xl font-bold tracking-tight mb-4" style="font-family:\'Cabinet Grotesk\', sans-serif;">Current Stage</h2>' +
              '</div>' +
              '<div class="progress-roadmap">' +
              '<div class="progress-roadmap-item">' +
              '<div class="progress-roadmap-badge done">Done</div>' +
              '<div class="progress-roadmap-text">Edge layer architecture built and running on local test environment</div>' +
              '</div>' +
              '<div class="progress-roadmap-item">' +
              '<div class="progress-roadmap-badge done">Done</div>' +
              '<div class="progress-roadmap-text">Patent Filed (Complete Specification) - App No. 202511059693</div>' +
              '</div>' +
              '<div class="progress-roadmap-item">' +
              '<div class="progress-roadmap-badge done">Done</div>' +
              '<div class="progress-roadmap-text">Token routing architecture designed and query mapping initiated</div>' +
              '</div>' +
              '<div class="progress-roadmap-item">' +
              '<div class="progress-roadmap-badge progress">In Progress</div>' +
              '<div class="progress-roadmap-text">Cloud inference on GCP - responses returning, fine-tuning ongoing</div>' +
              '</div>' +
              '<div class="progress-roadmap-item">' +

              '<div class="progress-roadmap-text">Edge-to-cloud hook - seamless routing integration</div>' +
              '</div>' +
              '<div class="progress-roadmap-item">' +
              '<div class="progress-roadmap-badge start">To Start</div>' +
              '<div class="progress-roadmap-text">Android APK - build and device testing</div>' +
              '</div>' +
              '<div class="progress-roadmap-item">' +
              '<div class="progress-roadmap-badge next">Next</div>' +
              '<div class="progress-roadmap-text">First NGO or government pilot deployment</div>' +
              '</div>' +
              '</div>' +
              '</div>';

            return true;
          }, 20, 400);
        }

        function enhanceContactLinks() {
          runUntilDone(function () {
            const footer = document.getElementById("contact");
            if (!footer) return false;

            const links = Array.from(footer.querySelectorAll("a"));
            if (!links.length) return false;

            links.forEach(function (link) {
              const href = link.getAttribute("href") || "";
              link.classList.add("contact-link-enhanced");
              link.style.pointerEvents = "auto";
              link.style.position = "relative";
              link.style.zIndex = "2";

              if (href.indexOf("linkedin.com") >= 0 || href.indexOf("http") === 0) {
                link.setAttribute("target", "_blank");
                link.setAttribute("rel", "noopener noreferrer");
              }
            });

            return true;
          }, 20, 400);
        }

        installDocsEnhancer();
        updateHeroCopy();
        removeDuplicateContactButton();
        removeDuplicateFooterIcons();
        updatePatentText();
        updateProgressStage();
        enhanceContactLinks();
      })();
    </script>
    <script data-pplx-inline-edit>
      (function () {
        if (window === window.top) return;
        function inlineAll(orig, clone) {
          if (orig.nodeType !== 1) return;
          try {
            var cs = getComputedStyle(orig);
            var t = "";
            for (var i = 0; i < cs.length; i++) {
              t += cs[i] + ":" + cs.getPropertyValue(cs[i]) + ";";
            }
            clone.style.cssText = t;
          } catch (e) {}
          var oc = orig.children,
            cc = clone.children;
          for (var j = 0; j < oc.length && j < cc.length; j++) {
            inlineAll(oc[j], cc[j]);
          }
        }
        function stripExternal(clone) {
          var imgs = clone.querySelectorAll("img");
          for (var i = 0; i < imgs.length; i++) {
            var s = imgs[i].getAttribute("src");
            if (s && !s.startsWith("data:")) imgs[i].removeAttribute("src");
          }
          var all = clone.querySelectorAll("*");
          for (var i = 0; i < all.length; i++) {
            var st = all[i].style.cssText;
            if (st && st.indexOf("url(") >= 0) {
              all[i].style.cssText = st.replace(/url\(["']?(?!data:)[^)"']*["']?\)/gi, "none");
            }
          }
        }
        window.addEventListener("message", function (e) {
          if (!e.data || e.data.type !== "INLINE_EDIT_CAPTURE_REQUEST") return;
          var scrollX = window.scrollX || window.pageXOffset || 0;
          var scrollY = window.scrollY || window.pageYOffset || 0;
          var w = window.innerWidth,
            h = window.innerHeight;
          try {
            var clone = document.documentElement.cloneNode(true);
            var rm = clone.querySelectorAll('script,link[rel="stylesheet"],style');
            for (var i = 0; i < rm.length; i++) {
              rm[i].remove();
            }
            inlineAll(document.documentElement, clone);
            stripExternal(clone);
            var html = new XMLSerializer().serializeToString(clone);
            var svg =
              '<svg xmlns="http://www.w3.org/2000/svg" width="' +
              w +
              '" height="' +
              h +
              '">' +
              '<foreignObject width="100%" height="100%">' +
              '<div xmlns="http://www.w3.org/1999/xhtml" style="width:' +
              w +
              "px;height:" +
              h +
              'px;overflow:hidden">' +
              '<div style="transform:translate(-' +
              scrollX +
              "px,-" +
              scrollY +
              'px);transform-origin:top left">' +
              html +
              "</div></div></foreignObject></svg>";
            var svgUrl = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
            var img = new Image();
            img.onload = function () {
              var c = document.createElement("canvas");
              c.width = w;
              c.height = h;
              c.getContext("2d").drawImage(img, 0, 0);
              window.parent.postMessage(
                {
                  type: "INLINE_EDIT_SCREENSHOT_RESULT",
                  dataUrl: c.toDataURL("image/png"),
                  scrollX: scrollX,
                  scrollY: scrollY
                },
                "*"
              );
            };
            img.onerror = function () {
              window.parent.postMessage(
                { type: "INLINE_EDIT_SCREENSHOT_RESULT", dataUrl: null, scrollX: scrollX, scrollY: scrollY },
                "*"
              );
            };
            img.src = svgUrl;
          } catch (err) {
            window.parent.postMessage(
              { type: "INLINE_EDIT_SCREENSHOT_RESULT", dataUrl: null, scrollX: scrollX, scrollY: scrollY },
              "*"
            );
          }
        });
      })();
    </script>
