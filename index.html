    <div id="root"></div>
    <script>
      (function () {
        const DOCS_DATA_URL = "./assets/docs-data.json";

        async function loadDocsData() {
          try {
            const response = await fetch(DOCS_DATA_URL, { cache: "no-store" });
            if (!response.ok) return [];
            return await response.json();
          } catch (error) {
            return [];
          }
        }

        function groupDocs(items) {
          const groups = new Map();
          items.forEach((item) => {
            const key = item.group || "Investor Materials";
            if (!groups.has(key)) groups.set(key, []);
            groups.get(key).push(item);
          });
          return Array.from(groups.entries());
        }

        function buildCard(item) {
          const card = document.createElement("a");
          card.className = "investor-card";
          card.href = item.url;
          card.target = item.external ? "_blank" : "_self";
          card.rel = item.external ? "noopener noreferrer" : "";

          if (item.variant === "deck") {
            card.classList.add("investor-card-deck");
          }

          const meta = document.createElement("div");
          meta.className = "investor-card-meta";
          meta.innerHTML =
            '<span class="investor-chip">' +
            (item.badge || "Material") +
            "</span>" +
            (item.meta ? '<span class="investor-meta-text">' + item.meta + "</span>" : "");

          const heading = document.createElement("h3");
          heading.className = "investor-card-title";
          heading.textContent = item.title;

          const subheading = document.createElement("p");
          subheading.className = "investor-card-subtitle";
          subheading.textContent = item.subtitle;

          const description = document.createElement("p");
          description.className = "investor-card-description";
          description.textContent = item.description;

          const footer = document.createElement("div");
          footer.className = "investor-card-footer";
          footer.innerHTML =
            '<span class="investor-open-text">Open material</span><span class="investor-arrow">→</span>';

          card.appendChild(meta);
          card.appendChild(heading);
          card.appendChild(subheading);
          card.appendChild(description);
          card.appendChild(footer);

          return card;
        }

        function renderInvestorDocs(section, items) {
          section.innerHTML = "";
          section.classList.add("investor-docs-section");

          const wrap = document.createElement("div");
          wrap.className = "investor-docs-wrap";

          const intro = document.createElement("div");
          intro.className = "investor-docs-intro";
          intro.innerHTML =
            '<span class="investor-section-kicker">Documents</span>' +
            '<h2 class="investor-section-title">Presentations and notes</h2>';
          wrap.appendChild(intro);

          groupDocs(items).forEach(function (entry) {
            const groupName = entry[0];
            const groupItems = entry[1];

            const group = document.createElement("section");
            group.className = "investor-docs-group";

            const header = document.createElement("div");
            header.className = "investor-docs-group-header";
            header.innerHTML =
              "<div>" +
              '<h3 class="investor-docs-group-title">' +
              groupName +
              "</h3>" +
              '<p class="investor-docs-group-subtitle">' +
              (groupItems[0].groupSubtitle || "Open each item in sequence during an investor conversation.") +
              "</p>" +
              "</div>" +
              '<span class="investor-group-count">' +
              groupItems.length +
              "</span>";

            const grid = document.createElement("div");
            grid.className = "investor-docs-grid";
            groupItems.forEach(function (item) {
              grid.appendChild(buildCard(item));
            });

            group.appendChild(header);
            group.appendChild(grid);
            wrap.appendChild(group);
          });

          section.appendChild(wrap);
        }

        function installDocsEnhancer() {
          let rendered = false;

          const attempt = async function () {
            const section = document.getElementById("docs");
            if (!section || rendered) return;
            const items = await loadDocsData();
            if (!items.length) return;
            renderInvestorDocs(section, items);
            rendered = true;
          };

          const observer = new MutationObserver(attempt);
          observer.observe(document.documentElement, { childList: true, subtree: true });
          window.addEventListener("load", attempt);
          document.addEventListener("DOMContentLoaded", attempt);
          setTimeout(attempt, 1200);
          setTimeout(attempt, 2500);
        }

        function updateHeroCopy() {
          const apply = function () {
            const hero = document.getElementById("hero");
            if (!hero) return;

            const paragraph = hero.querySelector("p");
            if (paragraph) {
              paragraph.textContent =
                "Edge-first AI infrastructure powered by intelligent edge-cloud orchestration. Cutting inference cost through smarter routing across device and cloud.";
            }
          };

          const observer = new MutationObserver(apply);
          observer.observe(document.documentElement, { childList: true, subtree: true });
          window.addEventListener("load", apply);
          document.addEventListener("DOMContentLoaded", apply);
          setTimeout(apply, 1200);
          setTimeout(apply, 2500);
        }

        function removeDuplicateContactButton() {
          const cleanup = function () {
            const buttons = Array.from(document.querySelectorAll("a"));
            const duplicate = buttons.find(function (link) {
              return link.textContent && link.textContent.trim() === "Get in Touch";
            });
            if (duplicate) {
              duplicate.remove();
            }
          };

          const observer = new MutationObserver(cleanup);
          observer.observe(document.documentElement, { childList: true, subtree: true });
          window.addEventListener("load", cleanup);
          document.addEventListener("DOMContentLoaded", cleanup);
          setTimeout(cleanup, 1200);
          setTimeout(cleanup, 2500);
        }

        function removeDuplicateFooterIcons() {
          const cleanup = function () {
            const footer = document.getElementById("contact");
            if (!footer) return;

            const iconRow = Array.from(footer.querySelectorAll("div")).find(function (node) {
              const directChildren = Array.from(node.children);
              if (
                directChildren.length !== 3 ||
                !directChildren.every(function (child) { return child.tagName === "A"; })
              ) {
                return false;
              }

              const hrefs = directChildren.map(function (link) {
                return link.getAttribute("href") || "";
              });
              return (
                hrefs.some(function (href) { return href.indexOf("linkedin.com") >= 0; }) &&
                hrefs.some(function (href) { return href.indexOf("mailto:") === 0; }) &&
                hrefs.some(function (href) { return href.indexOf("aiforall.ltd") >= 0; })
              );
            });

            if (iconRow) {
              iconRow.remove();
            }
          };

          const observer = new MutationObserver(cleanup);
          observer.observe(document.documentElement, { childList: true, subtree: true });
          window.addEventListener("load", cleanup);
          document.addEventListener("DOMContentLoaded", cleanup);
          setTimeout(cleanup, 1200);
          setTimeout(cleanup, 2500);
        }

        installDocsEnhancer();
        updateHeroCopy();
        removeDuplicateContactButton();
        removeDuplicateFooterIcons();
      })();
    </script>
    <script data-pplx-inline-edit>
      (function () {
        if (window === window.top) return;
        function inlineAll(orig, clone) {
          if (orig.nodeType !== 1) return;
          try {
            var cs = getComputedStyle(orig);
            var t = "";
            for (var i = 0; i < cs.length; i++) {
              t += cs[i] + ":" + cs.getPropertyValue(cs[i]) + ";";
            }
            clone.style.cssText = t;
          } catch (e) {}
          var oc = orig.children,
            cc = clone.children;
          for (var j = 0; j < oc.length && j < cc.length; j++) {
            inlineAll(oc[j], cc[j]);
          }
        }
        function stripExternal(clone) {
          var imgs = clone.querySelectorAll("img");
          for (var i = 0; i < imgs.length; i++) {
            var s = imgs[i].getAttribute("src");
            if (s && !s.startsWith("data:")) imgs[i].removeAttribute("src");
          }
          var all = clone.querySelectorAll("*");
          for (var i = 0; i < all.length; i++) {
            var st = all[i].style.cssText;
            if (st && st.indexOf("url(") >= 0) {
              all[i].style.cssText = st.replace(/url\(["']?(?!data:)[^)"']*["']?\)/gi, "none");
            }
          }
        }
        window.addEventListener("message", function (e) {
          if (!e.data || e.data.type !== "INLINE_EDIT_CAPTURE_REQUEST") return;
          var scrollX = window.scrollX || window.pageXOffset || 0;
          var scrollY = window.scrollY || window.pageYOffset || 0;
          var w = window.innerWidth,
            h = window.innerHeight;
          try {
            var clone = document.documentElement.cloneNode(true);
            var rm = clone.querySelectorAll('script,link[rel="stylesheet"],style');
            for (var i = 0; i < rm.length; i++) {
              rm[i].remove();
            }
            inlineAll(document.documentElement, clone);
            stripExternal(clone);
            var html = new XMLSerializer().serializeToString(clone);
            var svg =
              '<svg xmlns="http://www.w3.org/2000/svg" width="' +
              w +
              '" height="' +
              h +
              '">' +
              '<foreignObject width="100%" height="100%">' +
              '<div xmlns="http://www.w3.org/1999/xhtml" style="width:' +
              w +
              "px;height:" +
              h +
              'px;overflow:hidden">' +
              '<div style="transform:translate(-' +
              scrollX +
              "px,-" +
              scrollY +
              'px);transform-origin:top left">' +
              html +
              "</div></div></foreignObject></svg>";
            var svgUrl = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
            var img = new Image();
            img.onload = function () {
              var c = document.createElement("canvas");
              c.width = w;
              c.height = h;
              c.getContext("2d").drawImage(img, 0, 0);
              window.parent.postMessage(
                {
                  type: "INLINE_EDIT_SCREENSHOT_RESULT",
                  dataUrl: c.toDataURL("image/png"),
                  scrollX: scrollX,
                  scrollY: scrollY
                },
                "*"
              );
            };
            img.onerror = function () {
              window.parent.postMessage(
                { type: "INLINE_EDIT_SCREENSHOT_RESULT", dataUrl: null, scrollX: scrollX, scrollY: scrollY },
                "*"
              );
            };
            img.src = svgUrl;
          } catch (err) {
            window.parent.postMessage(
              { type: "INLINE_EDIT_SCREENSHOT_RESULT", dataUrl: null, scrollX: scrollX, scrollY: scrollY },
              "*"
            );
          }
        });
      })();
    </script>
