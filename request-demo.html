<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />
    <title>Request Demo - AI for ALL</title>
    <meta
      name="description"
      content="Request a demo of AI for ALL and get access details or a demo video link from the founder."
    />
    <meta name="author" content="Gaurav Kumar Singh" />
    <meta name="robots" content="noindex, nofollow" />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link
      href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800&f[]=satoshi@300,400,500,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/custom.css?v=20260413-1" />
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: #03070b;
        color: #f8fafc;
        font-family: 'Satoshi', sans-serif;
      }
      .page-shell {
        max-width: 720px;
        margin: 0 auto;
        padding: 2rem 1.25rem 3rem;
      }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 2rem;
      }
      .brand span {
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.02em;
      }
      .hero {
        margin-bottom: 2rem;
      }
      .hero h1 {
        margin: 0;
        font-size: clamp(2.25rem, 4vw, 3.25rem);
        line-height: 1.05;
      }
      .hero p {
        margin: 1rem 0 0;
        max-width: 40rem;
        color: #94a3b8;
        font-size: 1rem;
      }
      .card {
        background: rgba(15, 23, 42, 0.92);
        border: 1px solid rgba(148, 163, 184, 0.12);
        border-radius: 24px;
        padding: 2rem;
        box-shadow: 0 30px 80px rgba(8, 15, 29, 0.35);
      }
      .form-group {
        margin-bottom: 1.5rem;
      }
      label {
        display: block;
        margin-bottom: 0.5rem;
        font-size: 0.95rem;
        font-weight: 600;
        color: #e2e8f0;
      }
      input,
      textarea {
        width: 100%;
        background: #020508;
        border: 1px solid #334155;
        border-radius: 16px;
        color: #f8fafc;
        padding: 0.95rem 1rem;
        font-size: 1rem;
        transition: border 0.2s ease, box-shadow 0.2s ease;
      }
      input:focus,
      textarea:focus {
        outline: none;
        border-color: #22d3ee;
        box-shadow: 0 0 0 4px rgba(34, 211, 238, 0.12);
      }
      textarea {
        min-height: 140px;
        resize: vertical;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        align-items: center;
      }
      .button-primary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 52px;
        padding: 0 1.75rem;
        border-radius: 999px;
        border: none;
        background: #12b6d4;
        color: #0f172a;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: transform 0.2s ease, background 0.2s ease;
        text-decoration: none;
      }
      .button-primary:hover {
        transform: translateY(-1px);
        background: #0ea5e9;
      }
      .button-secondary {
        color: #94a3b8;
        text-decoration: none;
        font-size: 0.95rem;
      }
      .button-secondary:hover {
        color: #f8fafc;
      }
      .footnote {
        margin-top: 1.75rem;
        font-size: 0.9rem;
        color: #94a3b8;
        max-width: 38rem;
      }
      @media (max-width: 640px) {
        .page-shell {
          padding: 1.25rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="page-shell">
      <div class="brand">
        <span>AI FOR ALL</span>
      </div>

      <section class="hero">
        <h1>Request a demo of AI for ALL</h1>
        <p>Complete the form below and I will respond with demo access details, a recorded walkthrough, or the next step for app access.</p>
      </section>

      <section class="card">
        <form id="demoForm">
          <div class="form-group">
            <label for="name">Name *</label>
            <input id="name" name="name" type="text" placeholder="Your name" required />
          </div>

          <div class="form-group">
            <label for="email">Email *</label>
            <input id="email" name="email" type="email" placeholder="you@example.com" required />
          </div>

          <div class="form-group">
            <label for="company">Company / Role</label>
            <input id="company" name="company" type="text" placeholder="Company, team, or role" />
          </div>

          <div class="form-group">
            <label for="message">Message / Demo interest</label>
            <textarea id="message" name="message" placeholder="Share your use case or what you want to see in the demo"></textarea>
          </div>

          <div class="actions">
            <button type="submit" class="button-primary">Send request</button>
            <a href="/?" class="button-secondary">Back to home</a>
          </div>
          <p class="footnote">If email does not open, click here to open it directly: <a href="mailto:gaurav@aiforall.ltd" style="color: #12b6d4; text-decoration: underline;">gaurav@aiforall.ltd</a></p>
        </form>
      </section>
    </main>

    <script>
      document.getElementById('demoForm').addEventListener('submit', function (event) {
        event.preventDefault();
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const company = document.getElementById('company').value.trim();
        const message = document.getElementById('message').value.trim();

        const subject = encodeURIComponent('Request Demo - AI FOR ALL');
        const bodyLines = [
          'Hi Gaurav,',
          '',
          'I would like to request a demo of AI for ALL.',
          '',
          `Name: ${name}`,
          `Email: ${email}`,
          company ? `Company / Role: ${company}` : '',
          '',
          'Message:',
          message,
          '',
          'Thanks,'
          `${name}`
        ];
        const body = encodeURIComponent(bodyLines.filter(Boolean).join('\n'));
        const mailto = `mailto:gaurav@aiforall.ltd?subject=${subject}&body=${body}`;
        window.location.href = mailto;
      });
    </script>
  </body>
</html>
